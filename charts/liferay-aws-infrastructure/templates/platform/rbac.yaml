apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.platformSyncWave | default "-20" | quote }}
  labels:
    # Aggregating to crossplane-admin ensures visibility in the console
    rbac.crossplane.io/aggregate-to-crossplane: "true"
  name: crossplane-provider-kubernetes-liferay-manager
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"] # Permissions for Liferay config
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["namespaces"] # Required to check if target namespace exists
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.platformSyncWave | default "-20" | quote }}
  name: crossplane-provider-kubernetes-liferay-binding
subjects:
- kind: ServiceAccount
  name: provider-kubernetes # The name generated by Crossplane for this provider pod. Verify this matches your installed provider SA name.
  namespace: crossplane-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-provider-kubernetes-liferay-manager