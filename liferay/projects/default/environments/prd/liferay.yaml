liferay-default:
  replicaCount: 2
  resources:
    requests:
      cpu: "8"
      memory: 8Gi
    limits:
      cpu: "8"
      memory: 8Gi
  network:
    enabled: true
    endpointRef: misaelneto
    forceHttpsRedirect: true
    hostnames:
      - "prd-aws.misaelneto.com"
  portalProperties: |
    company.default.virtual.host.name=prd-aws.misaelneto.com
    company.default.web.id=prd-aws.misaelneto.com
    company.default.virtual.host.mail.domain=misaelneto.com
